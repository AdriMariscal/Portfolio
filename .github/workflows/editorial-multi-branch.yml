# Manages staging/main PRs for CMS editorial branches.
name: Editorial workflow multi-branch PRs

on:
  pull_request:
    types: [labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  editorial-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Create staging/main PRs from CMS status
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const label = context.payload.label?.name;
            const action = context.payload.action;
            if (!pr || !label) {
              return;
            }

            const cmsPrefixes = ["cms/", "cms_", "post/"];
            const isCmsBranch = cmsPrefixes.some((prefix) => pr.head.ref.startsWith(prefix));
            if (!isCmsBranch || pr.base.ref !== "dev") {
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headOwner = pr.head.repo?.owner?.login || owner;
            const headRef = pr.head.ref;
            const isSameRepo = pr.head.repo?.full_name === `${owner}/${repo}`;
            if (!isSameRepo) {
              return;
            }
            const head = `${headOwner}:${headRef}`;
            const allowedPrefixes = ["src/content/", "public/images/uploads/"];

            const listPrs = async (base, headRefValue = head) => {
              const { data } = await github.rest.pulls.list({
                owner,
                repo,
                base,
                head: headRefValue,
                state: "all",
              });
              return data;
            };

            const listFiles = async () => {
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: pr.number,
                per_page: 100,
              });
              return files;
            };

            const resolveHead = async () => {
              const files = await listFiles();
              const invalid = files.filter(
                (file) => !allowedPrefixes.some((prefix) => file.filename.startsWith(prefix))
              );
              const sanitized = headRef.replace(/\//g, "-");
              const filteredBranch = headRef.startsWith("cms/filtered/")
                ? headRef
                : `cms/filtered/${sanitized}`;

              let filteredExists = false;
              if (headRef.startsWith("cms/filtered/")) {
                filteredExists = true;
              } else {
                try {
                  await github.rest.git.getRef({
                    owner,
                    repo,
                    ref: `heads/${filteredBranch}`,
                  });
                  filteredExists = true;
                } catch (error) {
                  filteredExists = false;
                }
              }

              const preview = invalid
                .slice(0, 10)
                .map((file) => `- ${file.filename}`)
                .join("\n");

              if (!filteredExists) {
                const lines = [
                  "No encontre la rama filtrada para este entry.",
                  "Guarda de nuevo en el CMS para regenerarla y reintenta.",
                ];
                if (invalid.length > 0) {
                  lines.push("", "Archivos fuera de scope (primeros 10):", preview || "- (sin detalles)");
                }
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pr.number,
                  body: lines.join("\n"),
                });
                core.setFailed("Missing filtered branch for CMS changes.");
                return null;
              }

              if (invalid.length > 0) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pr.number,
                  body: [
                    "Detecte archivos fuera de scope del CMS.",
                    "Usare la rama filtrada para crear PRs a staging/main.",
                    "Los cambios fuera de scope quedan en la rama original.",
                    "",
                    "Archivos fuera de scope (primeros 10):",
                    preview || "- (sin detalles)",
                  ].join("\n"),
                });
              }

              return { headRef: `${owner}:${filteredBranch}`, invalid };
            };

            const ensurePr = async (base, titlePrefix, headRefValue) => {
              const existing = await listPrs(base, headRefValue);
              const open = existing.find((item) => item.state === "open");
              const merged = existing.find((item) => item.merged_at);
              if (open || merged) {
                return open || merged;
              }

              const { data } = await github.rest.pulls.create({
                owner,
                repo,
                base,
                head: headRefValue,
                title: `${titlePrefix}: ${pr.title}`,
                body: [
                  "Automated from Decap CMS editorial workflow.",
                  "",
                  `Source PR #${pr.number}: ${pr.html_url}`,
                ].join("\n"),
              });
              return data;
            };

            const isReady = action === "labeled" && label === "decap-cms/pending_publish";
            if (!isReady) {
              return;
            }

            const resolved = await resolveHead();
            if (!resolved) {
              return;
            }

            await ensurePr("staging", "Ready", resolved.headRef);
            await ensurePr("main", "Publish", resolved.headRef);
