# Runs axe-playwright accessibility audit on pull requests.
# Fails on "critical" and "serious" violations; ignores "moderate" and "minor".
name: CI A11Y

on:
  pull_request:
    branches:
      - dev
      - staging
      - main

jobs:
  a11y:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install chromium --with-deps

      - name: Run a11y audit
        run: pnpm run test:e2e:a11y

      - name: Upload axe results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-results
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
