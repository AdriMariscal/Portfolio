# Promotes CMS changes through dev -> staging -> main on label changes.
name: Editorial workflow promote

on:
  pull_request_target:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Gate CMS label
        id: gate
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const label = context.payload.label?.name;
            if (!pr || !label) {
              core.setOutput("skip", "true");
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const isSameRepo = pr.head.repo?.full_name === `${owner}/${repo}`;
            const isCmsPr = pr.base.ref === "dev" && pr.head.ref.startsWith("editorial/filtered/");
            if (!isSameRepo || !isCmsPr) {
              core.setOutput("skip", "true");
              return;
            }

            let stage = "";
            if (label === "decap-cms/pending_review") {
              stage = "review";
            } else if (label === "decap-cms/pending_publish") {
              stage = "ready";
            }

            if (!stage) {
              core.setOutput("skip", "true");
              return;
            }

            const body = pr.body || "";
            const match = body.match(/CMS branch:\s*(.+)/i);
            const cmsBranch = match ? match[1].trim() : pr.head.ref;

            core.setOutput("skip", "false");
            core.setOutput("stage", stage);
            core.setOutput("cms_branch", cmsBranch);
            core.setOutput("head_ref", pr.head.ref);
            core.setOutput("pr_number", pr.number.toString());

      - name: Checkout
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Force merge CMS PR into dev
        if: steps.gate.outputs.stage == 'review'
        run: |
          set -euo pipefail
          BASE="dev"
          HEAD="${{ steps.gate.outputs.head_ref }}"

          git fetch origin "$BASE" "$HEAD"
          git checkout -B "$BASE" "origin/$BASE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git merge --no-ff -X theirs "origin/$HEAD"; then
            git checkout --theirs .
            git add -A
            git commit -m "cms: force merge ${HEAD} into ${BASE}"
          fi

          git push origin "$BASE"

      - name: Create PR dev -> staging
        if: steps.gate.outputs.stage == 'review'
        uses: actions/github-script@v7
        env:
          CMS_BRANCH: ${{ steps.gate.outputs.cms_branch }}
          CMS_PR: ${{ steps.gate.outputs.pr_number }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const base = "staging";
            const head = `${owner}:dev`;
            const cmsBranch = process.env.CMS_BRANCH;
            const cmsPr = process.env.CMS_PR;

            const { data: existing } = await github.rest.pulls.list({
              owner,
              repo,
              base,
              head,
              state: "open",
            });

            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing[0].number,
                body: `CMS promotion update from ${cmsBranch} (source PR #${cmsPr}).`,
              });
              return;
            }

            const title = `cms: promote (${cmsBranch}) to staging`;
            const body = [
              "Automated promotion from Decap CMS.",
              `CMS branch: ${cmsBranch}`,
              `Source CMS PR: #${cmsPr}`,
            ].join("\n");

            await github.rest.pulls.create({
              owner,
              repo,
              base,
              head,
              title,
              body,
            });

      - name: Force merge dev into staging
        if: steps.gate.outputs.stage == 'ready'
        run: |
          set -euo pipefail
          BASE="staging"
          HEAD="dev"

          git fetch origin "$BASE" "$HEAD"
          git checkout -B "$BASE" "origin/$BASE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git merge --no-ff -X theirs "origin/$HEAD"; then
            git checkout --theirs .
            git add -A
            git commit -m "cms: force merge ${HEAD} into ${BASE}"
          fi

          git push origin "$BASE"

      - name: Create PR staging -> main
        if: steps.gate.outputs.stage == 'ready'
        uses: actions/github-script@v7
        env:
          CMS_BRANCH: ${{ steps.gate.outputs.cms_branch }}
          CMS_PR: ${{ steps.gate.outputs.pr_number }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const base = "main";
            const head = `${owner}:staging`;
            const cmsBranch = process.env.CMS_BRANCH;
            const cmsPr = process.env.CMS_PR;

            const { data: existing } = await github.rest.pulls.list({
              owner,
              repo,
              base,
              head,
              state: "open",
            });

            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing[0].number,
                body: `CMS promotion update from ${cmsBranch} (source PR #${cmsPr}).`,
              });
              return;
            }

            const title = `cms: promote (${cmsBranch}) to main`;
            const body = [
              "Automated promotion from Decap CMS.",
              `CMS branch: ${cmsBranch}`,
              `Source CMS PR: #${cmsPr}`,
            ].join("\n");

            await github.rest.pulls.create({
              owner,
              repo,
              base,
              head,
              title,
              body,
            });
