# Promotes CMS changes through dev -> staging -> main on label changes.
name: Editorial workflow promote

on:
  pull_request_target:
    types: [labeled, synchronize]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Gate CMS label
        id: gate
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setOutput("skip", "true");
              return;
            }

            const action = context.payload.action;
            const label = context.payload.label?.name;
            const labels = pr.labels?.map((item) => item.name) ?? [];
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headRef = pr.head.ref;
            const isSameRepo = pr.head.repo?.full_name === `${owner}/${repo}`;
            const isFiltered = headRef.startsWith("editorial/filtered/");
            const isCmsBranch =
              headRef.startsWith("cms/") ||
              headRef.startsWith("cms_") ||
              headRef.startsWith("post/") ||
              headRef.startsWith("post_");
            if (!isSameRepo || pr.base.ref !== "dev" || (!isFiltered && !isCmsBranch)) {
              core.setOutput("skip", "true");
              return;
            }

            let stage = "";
            if (label === "decap-cms/pending_review") {
              stage = "review";
            } else if (label === "decap-cms/pending_publish") {
              stage = "ready";
            } else if (action === "synchronize") {
              if (labels.includes("decap-cms/pending_review")) {
                stage = "review";
              } else if (labels.includes("decap-cms/pending_publish")) {
                stage = "ready";
              }
            }

            if (!stage) {
              core.setOutput("skip", "true");
              return;
            }

            let cmsBranch = headRef;
            if (isFiltered) {
              const body = pr.body || "";
              const match = body.match(/CMS branch:\s*(.+)/i);
              if (match) {
                cmsBranch = match[1].trim();
              }
            }

            const filteredBranch = isFiltered
              ? headRef
              : `editorial/filtered/${cmsBranch.replace(/\//g, "-")}`;

            core.setOutput("skip", "false");
            core.setOutput("stage", stage);
            core.setOutput("cms_branch", cmsBranch);
            core.setOutput("filtered_branch", filteredBranch);
            core.setOutput("pr_number", pr.number.toString());

      - name: Checkout
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure filtered branch
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -euo pipefail
          BASE="dev"
          CMS="${{ steps.gate.outputs.cms_branch }}"
          FILTERED="${{ steps.gate.outputs.filtered_branch }}"

          git fetch origin "$BASE" "$CMS"
          git -c core.quotepath=false diff --name-only "origin/${BASE}...origin/${CMS}" > changed-files.txt
          grep -E '^(src/content/|public/images/uploads/)' changed-files.txt > allowed-files.txt || true

          git checkout -B "$FILTERED" "origin/${BASE}"
          if [[ -s allowed-files.txt ]]; then
            xargs -d '\n' git checkout "origin/${CMS}" -- < allowed-files.txt
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -s allowed-files.txt ]]; then
            xargs -d '\n' git add < allowed-files.txt
          fi
          git commit --allow-empty -m "cms: sync filtered content"
          git push --force-with-lease origin "$FILTERED"

      - name: Force merge filtered PR into dev
        if: steps.gate.outputs.stage == 'review'
        run: |
          set -euo pipefail
          BASE="dev"
          HEAD="${{ steps.gate.outputs.filtered_branch }}"

          git fetch origin "$BASE" "$HEAD"
          git checkout -B "$BASE" "origin/$BASE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git merge --no-ff -X theirs "origin/$HEAD"; then
            git checkout --theirs .
            git add -A
            git commit -m "cms: force merge ${HEAD} into ${BASE}"
          fi

          git push origin "$BASE"

      - name: Create PR dev -> staging
        if: steps.gate.outputs.stage == 'review'
        uses: actions/github-script@v7
        env:
          CMS_BRANCH: ${{ steps.gate.outputs.cms_branch }}
          CMS_PR: ${{ steps.gate.outputs.pr_number }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const base = "staging";
            const head = `${owner}:dev`;
            const cmsBranch = process.env.CMS_BRANCH;
            const cmsPr = process.env.CMS_PR;

            const { data: existing } = await github.rest.pulls.list({
              owner,
              repo,
              base,
              head,
              state: "open",
            });

            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing[0].number,
                body: `CMS promotion update from ${cmsBranch} (source PR #${cmsPr}).`,
              });
              return;
            }

            const title = `cms: promote (${cmsBranch}) to staging`;
            const body = [
              "Automated promotion from Decap CMS.",
              `CMS branch: ${cmsBranch}`,
              `Source CMS PR: #${cmsPr}`,
            ].join("\n");

            await github.rest.pulls.create({
              owner,
              repo,
              base,
              head,
              title,
              body,
            });

      - name: Force merge dev into staging
        if: steps.gate.outputs.stage == 'ready'
        run: |
          set -euo pipefail
          BASE="staging"
          HEAD="dev"

          git fetch origin "$BASE" "$HEAD"
          git checkout -B "$BASE" "origin/$BASE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git merge --no-ff -X theirs "origin/$HEAD"; then
            git checkout --theirs .
            git add -A
            git commit -m "cms: force merge ${HEAD} into ${BASE}"
          fi

          git push origin "$BASE"

      - name: Create PR staging -> main
        if: steps.gate.outputs.stage == 'ready'
        uses: actions/github-script@v7
        env:
          CMS_BRANCH: ${{ steps.gate.outputs.cms_branch }}
          CMS_PR: ${{ steps.gate.outputs.pr_number }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const base = "main";
            const head = `${owner}:staging`;
            const cmsBranch = process.env.CMS_BRANCH;
            const cmsPr = process.env.CMS_PR;

            const { data: existing } = await github.rest.pulls.list({
              owner,
              repo,
              base,
              head,
              state: "open",
            });

            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing[0].number,
                body: `CMS promotion update from ${cmsBranch} (source PR #${cmsPr}).`,
              });
              return;
            }

            const title = `cms: promote (${cmsBranch}) to main`;
            const body = [
              "Automated promotion from Decap CMS.",
              `CMS branch: ${cmsBranch}`,
              `Source CMS PR: #${cmsPr}`,
            ].join("\n");

            await github.rest.pulls.create({
              owner,
              repo,
              base,
              head,
              title,
              body,
            });
