# Localizes remote images for CMS content committed directly to main (simple publish mode).
name: Editorial localize remote images (simple mode)

on:
  push:
    branches:
      - main
    paths:
      - "src/content/**/*.md"
      - "src/content/**/*.mdx"

permissions:
  contents: write

jobs:
  localize-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Collect changed content files
        id: files
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { data: commit } = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
            });
            const contentFiles = (commit.files ?? [])
              .map((f) => f.filename)
              .filter(
                (name) =>
                  name.startsWith('src/content/') &&
                  (name.endsWith('.md') || name.endsWith('.mdx'))
              );
            if (contentFiles.length === 0) {
              core.setOutput('count', '0');
              return;
            }
            fs.writeFileSync('changed-content-files.txt', contentFiles.join('\n'));
            core.setOutput('count', contentFiles.length.toString());

      - name: Localize remote images
        if: steps.files.outputs.count != '0'
        run: node scripts/localize-remote-images.mjs --file-list changed-content-files.txt

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content public/images/uploads
          git commit -m "chore: localize remote images"
          git push
