# Forces CMS content into staging/main when PRs conflict.
name: Editorial workflow force sync

on:
  pull_request_target:
    types: [opened, reopened, synchronize, labeled]

permissions:
  contents: write
  pull-requests: read
  issues: write

jobs:
  force-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Gate conflict sync
        id: gate
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setOutput("skip", "true");
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const base = pr.base.ref;
            const title = pr.title || "";
            const allowedBranchPrefixes = ["cms/", "cms_", "post/", "editorial/filtered/"];
            const isCmsBranch = allowedBranchPrefixes.some((prefix) => pr.head.ref.startsWith(prefix));
            const isSameRepo = pr.head.repo?.full_name === `${owner}/${repo}`;

            if (!isCmsBranch || !isSameRepo || !["staging", "main"].includes(base)) {
              core.setOutput("skip", "true");
              return;
            }

            if (base === "staging" && !title.startsWith("Ready:")) {
              core.setOutput("skip", "true");
              return;
            }

            if (base === "main" && !title.startsWith("Publish:")) {
              core.setOutput("skip", "true");
              return;
            }

            const { data: prData } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pr.number,
            });

            if (prData.mergeable_state === "unknown") {
              core.setOutput("skip", "true");
              return;
            }

            if (prData.mergeable_state !== "dirty") {
              core.setOutput("skip", "true");
              return;
            }

            if (base === "main") {
              const headOwner = pr.head.repo?.owner?.login || owner;
              const head = `${headOwner}:${pr.head.ref}`;
              const { data } = await github.rest.pulls.list({
                owner,
                repo,
                base: "staging",
                head,
                state: "all",
              });
              const merged = data.some((item) => item.merged_at);
              if (!merged) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pr.number,
                  body: "No forzare cambios en `main` hasta que `staging` este mergeada.",
                });
                core.setOutput("skip", "true");
                return;
              }
            }

            core.setOutput("skip", "false");
            core.setOutput("base_ref", base);
            core.setOutput("head_ref", pr.head.ref);
            core.setOutput("pr_number", pr.number.toString());

      - name: Checkout
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch branches
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -euo pipefail
          git fetch origin "${{ steps.gate.outputs.base_ref }}" "${{ steps.gate.outputs.head_ref }}"

      - name: Collect PR files
        if: steps.gate.outputs.skip != 'true'
        id: files
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.gate.outputs.pr_number }}
        with:
          script: |
            const fs = require("fs");
            const prNumber = Number(process.env.PR_NUMBER);
            if (!prNumber) {
              core.setOutput("allowed_count", "0");
              core.setOutput("disallowed_count", "0");
              return;
            }

            const allowedPrefixes = ["src/content/", "public/images/uploads/"];
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const allowed = [];
            const disallowed = [];
            for (const file of files) {
              if (allowedPrefixes.some((prefix) => file.filename.startsWith(prefix))) {
                allowed.push(file.filename);
              } else {
                disallowed.push(file.filename);
              }
            }

            fs.writeFileSync("allowed-files.txt", allowed.join("\n"));
            fs.writeFileSync("disallowed-files.txt", disallowed.join("\n"));
            core.setOutput("allowed_count", allowed.length.toString());
            core.setOutput("disallowed_count", disallowed.length.toString());

      - name: Sync CMS content to base
        if: steps.gate.outputs.skip != 'true' && steps.files.outputs.allowed_count != '0'
        run: |
          set -euo pipefail
          BASE="${{ steps.gate.outputs.base_ref }}"
          SOURCE="${{ steps.gate.outputs.head_ref }}"

          git checkout -B "$BASE" "origin/$BASE"
          xargs -d '\n' git checkout "origin/$SOURCE" -- < allowed-files.txt

          if git diff --quiet HEAD; then
            echo "No changes to sync."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          xargs -d '\n' git add < allowed-files.txt
          git commit -m "cms: apply content to ${BASE}"
          git push origin "$BASE"

      - name: Comment after sync
        if: steps.gate.outputs.skip != 'true' && steps.files.outputs.allowed_count != '0'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.gate.outputs.pr_number }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            if (!prNumber) {
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: "He aplicado los cambios del CMS a la rama destino para resolver conflictos.",
            });

      - name: Attempt merge after sync
        if: steps.gate.outputs.skip != 'true' && steps.files.outputs.allowed_count != '0'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.gate.outputs.pr_number }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            if (!prNumber) {
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const waitForMergeable = async () => {
              let pr = (await github.rest.pulls.get({ owner, repo, pull_number: prNumber })).data;
              for (let attempt = 0; attempt < 6; attempt += 1) {
                if (pr.mergeable && pr.mergeable_state === "clean") {
                  return pr;
                }
                await new Promise((resolve) => setTimeout(resolve, 2000));
                pr = (await github.rest.pulls.get({ owner, repo, pull_number: prNumber })).data;
              }
              return pr;
            };

            const pr = await waitForMergeable();
            if (!pr.mergeable || pr.mergeable_state !== "clean") {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body: "No pude hacer merge automatico aun; revisa si la PR sigue en conflicto.",
              });
              return;
            }

            await github.rest.pulls.merge({
              owner,
              repo,
              pull_number: prNumber,
              merge_method: "squash",
            });
