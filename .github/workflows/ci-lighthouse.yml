# .github/workflows/ci-lighthouse.yml
name: CI – Lighthouse a11y/SEO

on:
  pull_request:
    branches:
      - dev
      - staging
      - main

jobs:
  lighthouse-ci:
    name: Lighthouse CI (accesibilidad + SEO)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install

      - name: Build de Astro
        run: npm run build

      - name: Instalar Lighthouse CI (CLI)
        run: npm install -g @lhci/cli@0.15.x

      - name: Ejecutar Lighthouse CI
        run: lhci autorun
