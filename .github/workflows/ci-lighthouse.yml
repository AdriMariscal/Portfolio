# Runs Lighthouse CI on pull requests.
name: CI Lighthouse

on:
  pull_request:
    branches:
      - dev
      - staging
      - main

jobs:
  lighthouse-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Astro site
        run: pnpm run build

      - name: Install Lighthouse CI (CLI)
        run: npm install -g @lhci/cli@0.15.x

      - name: Run Lighthouse CI
        id: lhci
        continue-on-error: true
        run: lhci autorun

      - name: Generate Lighthouse summary
        if: always()
        run: node scripts/lhci-summary.mjs

      - name: Fail if Lighthouse budgets fail
        if: steps.lhci.outcome == 'failure'
        run: exit 1
