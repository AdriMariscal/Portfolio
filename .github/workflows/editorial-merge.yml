# Auto-merges CMS pull requests based on editorial workflow state.
name: Editorial workflow auto-merge

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled, unlabeled, closed]
  workflow_run:
    workflows:
      - CI Lint
      - CI Typecheck
      - CI Unit Tests
      - CI E2E
      - CI Lighthouse
      - CI Audit
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: editorial-merge-${{ github.event.pull_request.number || github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Merge CMS PRs from editorial workflow
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const prNumbers = (() => {
              if (context.eventName === "pull_request") {
                const number = context.payload.pull_request?.number;
                return number ? [number] : [];
              }
              if (context.eventName === "workflow_run") {
                const prs = context.payload.workflow_run?.pull_requests || [];
                return prs.map((pr) => pr.number).filter(Boolean);
              }
              return [];
            })();

            if (prNumbers.length === 0) {
              return;
            }

            const allowedBranchPrefixes = ["cms/", "cms_", "post/", "editorial/filtered/"];
            const allowedFilePrefixes = ["src/content/", "public/images/uploads/"];
            const action = context.payload.action;
            const label = context.payload.label?.name;

            const listFiles = async (pullNumber) => {
              return github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: pullNumber,
                per_page: 100,
              });
            };

            const hasOnlyCmsFiles = async (pullNumber) => {
              const files = await listFiles(pullNumber);
              const invalid = files.filter(
                (file) => !allowedFilePrefixes.some((prefix) => file.filename.startsWith(prefix))
              );
              if (invalid.length === 0) {
                return true;
              }

              const preview = invalid
                .slice(0, 10)
                .map((file) => `- ${file.filename}`)
                .join("\n");
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pullNumber,
                body: [
                  "Bloqueo el merge automatico: hay archivos fuera del scope del CMS.",
                  "Solo se permiten cambios en:",
                  "- `src/content/**`",
                  "- `public/images/uploads/**`",
                  "",
                  "Archivos fuera de scope (primeros 10):",
                  preview || "- (sin detalles)",
                ].join("\n"),
              });
              return false;
            };

            const listPrs = async (baseBranch, headRef) => {
              const { data } = await github.rest.pulls.list({
                owner,
                repo,
                base: baseBranch,
                head: headRef,
                state: "all",
              });
              return data;
            };

            const isStagingMerged = async (headOwnerLogin, headRef) => {
              const head = `${headOwnerLogin}:${headRef}`;
              const data = await listPrs("staging", head);
              return data.some((item) => item.merged_at);
            };

            const commentWaitingForStaging = async (pullNumber) => {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pullNumber,
                body: "Espero a que la PR a `staging` este mergeada antes de fusionar a `main`.",
              });
            };

            const commentMergeFailure = async (pullNumber, message) => {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pullNumber,
                body: message,
              });
            };

            const waitForMergeableState = async (pullNumber) => {
              let { data: pr } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pullNumber,
              });

              for (let attempt = 0; attempt < 6; attempt += 1) {
                const isUnknown = !pr.mergeable_state || pr.mergeable_state === "unknown";
                if (!isUnknown) {
                  break;
                }
                await new Promise((resolve) => setTimeout(resolve, 2000));
                pr = (
                  await github.rest.pulls.get({
                    owner,
                    repo,
                    pull_number: pullNumber,
                  })
                ).data;
              }

              return pr;
            };

            const shouldMergeNow = (pr) => pr.mergeable && pr.mergeable_state === "clean";

            const mergePr = async (pullNumber) => {
              const attemptMerge = async () => {
                await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: pullNumber,
                  merge_method: "squash",
                });
              };

              try {
                await attemptMerge();
                return;
              } catch (error) {
                let mergeError = error;
                if (error.message && error.message.includes("Merge already in progress")) {
                  await new Promise((resolve) => setTimeout(resolve, 3000));
                  const { data: refreshed } = await github.rest.pulls.get({
                    owner,
                    repo,
                    pull_number: pullNumber,
                  });
                  if (refreshed.merged || refreshed.state !== "open") {
                    return;
                  }

                  try {
                    await attemptMerge();
                    return;
                  } catch (retryError) {
                    mergeError = retryError;
                  }
                }

                core.warning(`Merge failed: ${mergeError.message}`);
                await commentMergeFailure(
                  pullNumber,
                  "No pude hacer el merge automatico. Revisa conflictos o permisos."
                );
              }
            };

            const processPr = async (pullNumber) => {
              const pr = await waitForMergeableState(pullNumber);
              const base = pr.base.ref;
              const isCmsBranch = allowedBranchPrefixes.some((prefix) => pr.head.ref.startsWith(prefix));
              const isSameRepo = pr.head.repo?.full_name === `${owner}/${repo}`;

              if (!isCmsBranch || !isSameRepo) {
                return;
              }

              if (!["dev", "staging", "main"].includes(base)) {
                return;
              }

              const headOwner = pr.head.repo?.owner?.login || owner;
              const head = `${headOwner}:${pr.head.ref}`;
              const filteredRef = pr.head.ref.startsWith("editorial/filtered/")
                ? pr.head.ref
                : `editorial/filtered/${pr.head.ref.replace(/\//g, "-")}`;
              const filteredHead = `${headOwner}:${filteredRef}`;

              const hasPendingPublish = pr.labels.some((item) => item.name === "decap-cms/pending_publish");
              const isPublishSignal =
                base === "dev" &&
                context.eventName === "pull_request" &&
                ((action === "unlabeled" && label === "decap-cms/pending_publish") ||
                  (action === "closed" && hasPendingPublish));

              if (isPublishSignal) {
                const findOpen = (prs) => prs.find((item) => item.state === "open");
                let mainPr = findOpen(await listPrs("main", head));
                if (!mainPr) {
                  mainPr = findOpen(await listPrs("main", filteredHead));
                }
                if (!mainPr) {
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: pr.number,
                    body: "No encontre PR abierta a `main` para publicar este contenido.",
                  });
                } else if (!(await hasOnlyCmsFiles(mainPr.number))) {
                  return;
                } else {
                  await github.rest.issues.addLabels({
                    owner,
                    repo,
                    issue_number: mainPr.number,
                    labels: ["decap-cms/pending_publish"],
                  });

                  const mainPrData = await waitForMergeableState(mainPr.number);
                  const publishHeadOwner = mainPrData.head.repo?.owner?.login || owner;
                  const publishHeadRef = mainPrData.head.ref;
                  const stagingMerged = await isStagingMerged(publishHeadOwner, publishHeadRef);
                  if (!stagingMerged) {
                    await commentWaitingForStaging(mainPr.number);
                  } else if (shouldMergeNow(mainPrData)) {
                    await mergePr(mainPrData.number);
                  }
                }
              }

              if (pr.state !== "open") {
                return;
              }

              if (base === "dev") {
                return;
              }

              if (!(await hasOnlyCmsFiles(pr.number))) {
                return;
              }

              if (base === "main") {
                const canPublish = pr.labels.some((item) => item.name === "decap-cms/pending_publish");
                if (!canPublish) {
                  return;
                }
                const stagingMerged = await isStagingMerged(headOwner, pr.head.ref);
                if (!stagingMerged) {
                  await commentWaitingForStaging(pr.number);
                  return;
                }
              }

              if (!shouldMergeNow(pr)) {
                if (
                  context.eventName === "pull_request" &&
                  ["blocked", "dirty"].includes(pr.mergeable_state || "")
                ) {
                  await commentMergeFailure(
                    pr.number,
                    "No puedo auto-mergear: la PR esta bloqueada por revisiones requeridas o conflictos."
                  );
                }
                return;
              }

              await mergePr(pr.number);
            };

            for (const number of prNumbers) {
              await processPr(number);
            }
