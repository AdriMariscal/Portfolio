name: Editorial workflow auto-merge

on:
  workflow_run:
    workflows: ["CI – E2E + Lighthouse"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: read

jobs:
  merge:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Merge CMS PRs after CI
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const prs = run.pull_requests || [];
            if (prs.length === 0) {
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const allowedBranchPrefixes = ["cms/", "post/"];
            const allowedFilePrefixes = ["src/content/", "public/images/uploads/"];

            const listFiles = async (pullNumber) => {
              return github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: pullNumber,
                per_page: 100,
              });
            };

            const hasOnlyCmsFiles = async (pullNumber) => {
              const files = await listFiles(pullNumber);
              const invalid = files.filter(
                (file) => !allowedFilePrefixes.some((prefix) => file.filename.startsWith(prefix))
              );
              if (invalid.length === 0) {
                return true;
              }

              const preview = invalid
                .slice(0, 10)
                .map((file) => `- ${file.filename}`)
                .join("\n");
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pullNumber,
                body: [
                  "Bloqueo el merge automático: hay archivos fuera del scope del CMS.",
                  "Solo se permiten cambios en:",
                  "- `src/content/**`",
                  "- `public/images/uploads/**`",
                  "",
                  "Archivos fuera de scope (primeros 10):",
                  preview || "- (sin detalles)",
                ].join("\n"),
              });
              return false;
            };

            const isStagingMerged = async (headOwnerLogin, headRef) => {
              const head = `${headOwnerLogin}:${headRef}`;
              const { data } = await github.rest.pulls.list({
                owner,
                repo,
                base: "staging",
                head,
                state: "all",
              });
              return data.some((item) => item.merged_at);
            };

            const commentWaitingForStaging = async (pullNumber) => {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pullNumber,
                body:
                  "Espero a que la PR a `staging` esté mergeada antes de fusionar a `main`.",
              });
            };

            for (const prRef of prs) {
              const { data: pr } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: prRef.number,
              });

              if (pr.state !== "open") {
                continue;
              }

              if (!["staging", "main"].includes(pr.base.ref)) {
                continue;
              }

              if (!allowedBranchPrefixes.some((prefix) => pr.head.ref.startsWith(prefix))) {
                continue;
              }

              if (!(await hasOnlyCmsFiles(pr.number))) {
                continue;
              }

              const headOwner = pr.head.repo?.owner?.login || owner;
              if (pr.base.ref === "main") {
                const stagingMerged = await isStagingMerged(headOwner, pr.head.ref);
                if (!stagingMerged) {
                  await commentWaitingForStaging(pr.number);
                  continue;
                }
              }

              try {
                await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: pr.number,
                  merge_method: "squash",
                });
              } catch (error) {
                core.warning(`Merge failed: ${error.message}`);
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pr.number,
                  body: "No pude hacer el merge automático. Revisa conflictos o permisos.",
                });
              }
            }
