# Creates draft PRs to dev for CMS branches and optionally filters changes to the entry + images.
name: Editorial workflow draft PRs

on:
  push:
    branches:
      - "cms/**"
      - "cms_*/**"
      - "cms_*"
      - "post/**"
      - "post_*/**"
      - "post_*"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  draft-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse CMS entry
        id: entry
        run: |
          set -euo pipefail

          BRANCH="${GITHUB_REF_NAME}"
          collection=""
          slug=""
          IFS='/' read -ra PARTS <<< "$BRANCH"
          for ((i=0; i<${#PARTS[@]}; i++)); do
            part="${PARTS[$i]}"
            if [[ "$part" == "projects" || "$part" == "blog" ]]; then
              if [[ $((i+1)) -lt ${#PARTS[@]} ]]; then
                collection="$part"
                slug="${PARTS[$i+1]}"
                break
              fi
            fi
          done
          if [[ -z "$collection" && "$BRANCH" =~ ^post/([^/]+)$ ]]; then
            collection="blog"
            slug="${BASH_REMATCH[1]}"
          fi

          echo "collection=$collection" >> "$GITHUB_OUTPUT"
          echo "slug=$slug" >> "$GITHUB_OUTPUT"

      - name: Find CMS PR
        id: cms_pr
        uses: actions/github-script@v7
        env:
          CMS_COLLECTION: ${{ steps.entry.outputs.collection }}
          CMS_SLUG: ${{ steps.entry.outputs.slug }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const collection = process.env.CMS_COLLECTION;
            const slug = process.env.CMS_SLUG;

            if (!collection || !slug) {
              core.setOutput("exists", "false");
              return;
            }

            const entrySuffix = `${collection}/${slug}`;
            const prs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              base: "dev",
              state: "open",
              per_page: 100,
            });

            const cmsPr = prs.find((pr) => {
              const body = pr.body || "";
              return body.includes("Automatically generated by Decap CMS") &&
                pr.head?.ref?.endsWith(entrySuffix);
            });

            if (!cmsPr) {
              core.setOutput("exists", "false");
              return;
            }

            core.setOutput("exists", "true");
            core.setOutput("number", cmsPr.number.toString());
            core.setOutput("head", cmsPr.head.ref);

      - name: Prepare draft PR data
        id: prep
        env:
          CMS_COLLECTION: ${{ steps.entry.outputs.collection }}
          CMS_SLUG: ${{ steps.entry.outputs.slug }}
          CMS_PR_EXISTS: ${{ steps.cms_pr.outputs.exists }}
          CMS_PR_HEAD: ${{ steps.cms_pr.outputs.head }}
        run: |
          set -euo pipefail

          BRANCH="${GITHUB_REF_NAME}"
          if [[ "$BRANCH" == cms/filtered/* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASE="dev"
          SOURCE="$BRANCH"
          if [[ "${CMS_PR_EXISTS}" == "true" && -n "${CMS_PR_HEAD}" ]]; then
            SOURCE="${CMS_PR_HEAD}"
          fi
          git fetch origin "${BASE}" "${SOURCE}"

          collection="${CMS_COLLECTION}"
          slug="${CMS_SLUG}"

          if [[ "$BRANCH" == cms_* && -n "$collection" && -n "$slug" ]]; then
            git fetch origin "cms/${collection}/${slug}" || true
            if git show-ref --verify --quiet "refs/remotes/origin/cms/${collection}/${slug}"; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "collection=$collection" >> "$GITHUB_OUTPUT"
          echo "slug=$slug" >> "$GITHUB_OUTPUT"
          echo "source_branch=$SOURCE" >> "$GITHUB_OUTPUT"

          git diff --name-only "origin/${BASE}...origin/${SOURCE}" > changed-files.txt
          if [[ ! -s changed-files.txt ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          : > allowed-files.txt
          : > disallowed-files.txt

          while IFS= read -r file; do
            if [[ "$file" == public/images/uploads/* ]]; then
              echo "$file" >> allowed-files.txt
              continue
            fi

            if [[ -n "$collection" && -n "$slug" ]]; then
              if [[ "$file" == "src/content/${collection}/${slug}.md" || "$file" == "src/content/${collection}/${slug}.mdx" ]]; then
                echo "$file" >> allowed-files.txt
              else
                echo "$file" >> disallowed-files.txt
              fi
              continue
            fi

            if [[ "$file" == src/content/* ]]; then
              echo "$file" >> allowed-files.txt
            else
              echo "$file" >> disallowed-files.txt
            fi
          done < changed-files.txt

          if [[ ! -s allowed-files.txt ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -s disallowed-files.txt ]]; then
            echo "needs_filtered=true" >> "$GITHUB_OUTPUT"
            sanitized="${SOURCE//\//-}"
            echo "pr_branch=cms/filtered/${sanitized}" >> "$GITHUB_OUTPUT"
          else
            echo "needs_filtered=false" >> "$GITHUB_OUTPUT"
            echo "pr_branch=${SOURCE}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create filtered branch
        if: steps.prep.outputs.skip != 'true' && steps.prep.outputs.needs_filtered == 'true'
        run: |
          set -euo pipefail

          BASE="dev"
          SOURCE="${{ steps.prep.outputs.source_branch }}"
          FILTERED="${{ steps.prep.outputs.pr_branch }}"

          git checkout -B "$FILTERED" "origin/${BASE}"
          xargs -d '\n' git checkout "origin/${SOURCE}" -- < allowed-files.txt

          if git diff --quiet; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          xargs -d '\n' git add < allowed-files.txt

          COLLECTION="${{ steps.prep.outputs.collection }}"
          SLUG="${{ steps.prep.outputs.slug }}"
          if [[ -n "$COLLECTION" && -n "$SLUG" ]]; then
            git commit -m "cms: sync ${COLLECTION} \"${SLUG}\""
          else
            git commit -m "cms: sync content changes"
          fi

          git push --force-with-lease origin "$FILTERED"

      - name: Comment on CMS PR about filtered sync
        if: steps.cms_pr.outputs.exists == 'true' && steps.prep.outputs.needs_filtered == 'true'
        uses: actions/github-script@v7
        env:
          CMS_PR_NUMBER: ${{ steps.cms_pr.outputs.number }}
        with:
          script: |
            const fs = require("fs");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = Number(process.env.CMS_PR_NUMBER);
            if (!prNumber) {
              return;
            }

            let details = "";
            try {
              const disallowed = fs.readFileSync("disallowed-files.txt", "utf8").trim();
              if (disallowed) {
                const lines = disallowed
                  .split(/\r?\n/)
                  .slice(0, 20)
                  .map((line) => `- ${line}`)
                  .join("\n");
                details = `\n\nArchivos fuera de scope (primeros 20):\n${lines}`;
              }
            } catch (error) {
              core.warning(`Unable to read disallowed-files.txt: ${error.message}`);
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: [
                "He preparado una rama filtrada con solo el contenido del entry y sus imagenes.",
                "Los cambios fuera de scope se mantienen en la rama original y no se han perdido.",
                details,
              ].join("\n"),
            });

      - name: Create PR to dev
        if: steps.prep.outputs.skip != 'true' && steps.cms_pr.outputs.exists != 'true'
        uses: actions/github-script@v7
        env:
          PR_BRANCH: ${{ steps.prep.outputs.pr_branch }}
          SOURCE_BRANCH: ${{ steps.prep.outputs.source_branch }}
          CMS_COLLECTION: ${{ steps.prep.outputs.collection }}
          CMS_SLUG: ${{ steps.prep.outputs.slug }}
          NEEDS_FILTERED: ${{ steps.prep.outputs.needs_filtered }}
        with:
          script: |
            const fs = require("fs");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const base = "dev";
            const collection = process.env.CMS_COLLECTION;
            const slug = process.env.CMS_SLUG;

            if (collection && slug) {
              const entrySuffix = `${collection}/${slug}`;
              const prs = await github.paginate(github.rest.pulls.list, {
                owner,
                repo,
                base,
                state: "open",
                per_page: 100,
              });
              const cmsPr = prs.find((pr) => {
                const body = pr.body || "";
                return body.includes("Automatically generated by Decap CMS") &&
                  pr.head?.ref?.endsWith(entrySuffix);
              });
              if (cmsPr) {
                core.info(`CMS PR already exists (#${cmsPr.number}) for ${entrySuffix}`);
                return;
              }
            }

            const headRef = `${owner}:${process.env.PR_BRANCH}`;
            const existing = await github.rest.pulls.list({
              owner,
              repo,
              base,
              head: headRef,
              state: "open",
            });
            if (existing.data.length > 0) {
              core.info(`PR already exists for ${headRef}`);
              return;
            }

            const title = collection && slug
              ? `cms: update ${collection} "${slug}"`
              : `cms: update content (${process.env.PR_BRANCH})`;

            const { data: pr } = await github.rest.pulls.create({
              owner,
              repo,
              base,
              head: headRef,
              title,
              body: [
                "Automated from Decap CMS draft save.",
                "",
                `Source branch: \`${process.env.SOURCE_BRANCH}\``,
              ].join("\n"),
            });

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pr.number,
              labels: ["decap-cms/draft"],
            });

            if (process.env.NEEDS_FILTERED === "true") {
              let details = "";
              try {
                const disallowed = fs.readFileSync("disallowed-files.txt", "utf8").trim();
                if (disallowed) {
                  const lines = disallowed
                    .split(/\r?\n/)
                    .slice(0, 20)
                    .map((line) => `- ${line}`)
                    .join("\n");
                  details = `\n\nArchivos fuera de scope (primeros 20):\n${lines}`;
                }
              } catch (error) {
                core.warning(`Unable to read disallowed-files.txt: ${error.message}`);
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body: [
                  "He creado esta PR con solo el contenido del entry y sus imagenes.",
                  "Los cambios fuera de scope se mantienen en la rama original y no se han perdido.",
                  details,
                ].join("\n"),
              });
            }
