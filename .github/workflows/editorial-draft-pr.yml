# Creates filtered CMS branch and PR to dev on save.
name: Editorial workflow draft PRs

on:
  push:
    branches:
      - "cms/**"
      - "cms_*/**"
      - "cms_*"
      - "post/**"
      - "post_*/**"
      - "post_*"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  draft-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare filtered branch
        id: prep
        run: |
          set -euo pipefail
          BASE="dev"
          SOURCE="${GITHUB_REF_NAME}"

          git fetch origin "$BASE" "$SOURCE"
          git -c core.quotepath=false diff --name-only "origin/${BASE}...origin/${SOURCE}" > changed-files.txt
          if [[ ! -s changed-files.txt ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          grep -E '^(src/content/|public/images/uploads/)' changed-files.txt > allowed-files.txt || true
          if [[ ! -s allowed-files.txt ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          sanitized="${SOURCE//\//-}"
          filtered="editorial/filtered/${sanitized}"
          echo "filtered_branch=${filtered}" >> "$GITHUB_OUTPUT"
          echo "cms_branch=${SOURCE}" >> "$GITHUB_OUTPUT"

      - name: Build filtered branch
        if: steps.prep.outputs.skip != 'true'
        run: |
          set -euo pipefail
          BASE="dev"
          SOURCE="${{ steps.prep.outputs.cms_branch }}"
          FILTERED="${{ steps.prep.outputs.filtered_branch }}"

          git checkout -B "$FILTERED" "origin/${BASE}"
          xargs -d '\n' git checkout "origin/${SOURCE}" -- < allowed-files.txt

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          xargs -d '\n' git add < allowed-files.txt
          git commit --allow-empty -m "cms: sync filtered content"
          git push --force-with-lease origin "$FILTERED"

      - name: Create PR to dev
        if: steps.prep.outputs.skip != 'true'
        uses: actions/github-script@v7
        env:
          CMS_BRANCH: ${{ steps.prep.outputs.cms_branch }}
          FILTERED_BRANCH: ${{ steps.prep.outputs.filtered_branch }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const base = "dev";
            const head = `${owner}:${process.env.FILTERED_BRANCH}`;

            const { data: existing } = await github.rest.pulls.list({
              owner,
              repo,
              base,
              head,
              state: "open",
            });

            if (existing.length > 0) {
              const prNumber = existing[0].number;
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: prNumber,
                labels: ["decap-cms/draft"],
              });
              return;
            }

            const title = `cms: update content (${process.env.CMS_BRANCH})`;
            const { data: pr } = await github.rest.pulls.create({
              owner,
              repo,
              base,
              head,
              title,
              body: [
                "Automated from Decap CMS.",
                `CMS branch: ${process.env.CMS_BRANCH}`,
                `Filtered branch: ${process.env.FILTERED_BRANCH}`,
              ].join("\n"),
            });

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pr.number,
              labels: ["decap-cms/draft"],
            });
