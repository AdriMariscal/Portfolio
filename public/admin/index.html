<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CMS - Portfolio</title>
    <link rel="icon" href="/logos/favicon.png" type="image/png" />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
      crossorigin="anonymous"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --font-ui: Inter, system-ui, -apple-system, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        --font-display: Sora, Inter, system-ui, sans-serif;
        --color-bg: #0a0a0a;
        --color-surface: #1f2426;
        --color-surface-alt: #2f3437;
        --color-heading: #fbe7b5;
        --color-text: #e8d3a3;
        --color-text-muted: #cccccc;
        --color-border: #3a4246;
        --color-accent: #2dd4bf;
        --color-accent-strong: #2dd4bf;
        --color-accent-contrast: #0a0a0a;
        --shadow-soft: 0 6px 24px rgba(0, 0, 0, 0.35);
        --shadow-strong: 0 18px 40px rgba(0, 0, 0, 0.55);
        --radius-lg: 20px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(
            circle at top left,
            rgba(45, 212, 191, 0.24),
            transparent 55%
          ),
          radial-gradient(
            circle at bottom right,
            rgba(245, 158, 11, 0.12),
            transparent 55%
          ),
          var(--color-bg);
        color: var(--color-text);
        font-family: var(--font-ui);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .auth-shell {
        width: min(560px, 100%);
      }

      .auth-card {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-soft);
        padding: 32px;
        display: grid;
        gap: 16px;
      }

      .auth-card__eyebrow {
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 0.2em;
        color: var(--color-text-muted);
      }

      .auth-card__title {
        font-family: var(--font-display);
        font-size: 2rem;
        margin: 0;
        color: var(--color-heading);
      }

      .auth-card__subtitle {
        margin: 0;
        color: var(--color-text);
        line-height: 1.5;
      }

      .auth-card__button {
        border: none;
        border-radius: 999px;
        padding: 12px 24px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        background: var(--color-accent);
        color: var(--color-accent-contrast);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        box-shadow: var(--shadow-soft);
      }

      .auth-card__button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
        box-shadow: none;
      }

      .auth-card__button:not(:disabled):hover {
        transform: translateY(-1px);
        box-shadow: var(--shadow-strong);
      }

      .auth-card__status {
        margin: 0;
        font-size: 0.95rem;
        color: var(--color-text-muted);
      }
    </style>
  </head>
  <body>
    <main class="auth-shell">
      <section id="auth0-root" class="auth-card">
        <span class="auth-card__eyebrow">Acceso privado</span>
        <h1 class="auth-card__title">CMS</h1>
        <p class="auth-card__subtitle">
          Inicia sesión con Auth0 para administrar el contenido.
        </p>
        <button id="auth0-login" class="auth-card__button" disabled>
          Iniciar sesión
        </button>
        <p class="auth-card__status">Cargando configuración…</p>
      </section>
    </main>
    <script src="/admin/auth0-config.js"></script>
    <script src="/admin/auth0-login.js" defer></script>
  </body>
</html>
