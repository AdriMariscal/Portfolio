<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CMS · Portfolio</title>
    <link rel="icon" href="/logos/favicon.png" type="image/png" />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
      crossorigin="anonymous"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --font-ui: Inter, system-ui, -apple-system, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        --font-display: Sora, Inter, system-ui, sans-serif;
        --color-bg: #0a0a0a;
        --color-surface: #1f2426;
        --color-surface-alt: #2f3437;
        --color-heading: #fbe7b5;
        --color-text: #e8d3a3;
        --color-text-muted: #cccccc;
        --color-border: #3a4246;
        --color-accent: #2dd4bf;
        --color-accent-strong: #2dd4bf;
        --color-accent-contrast: #0a0a0a;
        --shadow-soft: 0 6px 24px rgba(0, 0, 0, 0.35);
        --shadow-strong: 0 18px 40px rgba(0, 0, 0, 0.55);
        --radius-lg: 20px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(
            circle at top left,
            rgba(45, 212, 191, 0.24),
            transparent 55%
          ),
          radial-gradient(
            circle at bottom right,
            rgba(245, 158, 11, 0.12),
            transparent 55%
          ),
          var(--color-bg);
        color: var(--color-text);
        font-family: var(--font-ui);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .cms-loading {
        font-family: var(--font-display);
        font-size: 1.5rem;
        color: var(--color-heading);
        margin: 0;
      }
    </style>
  </head>
  <body>
    <p class="cms-loading">Cargando CMS…</p>
    <script src="https://cdn.jsdelivr.net/npm/decap-cms@3/dist/decap-cms.js"></script>
  </body>
</html>
