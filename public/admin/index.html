<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CMS · Portfolio</title>
    <link rel="icon" href="/logos/favicon.png" type="image/png" />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
      crossorigin="anonymous"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="/admin/auth0-config.js"></script>
    <script src="https://cdn.auth0.com/js/auth0-spa-js/2.1/auth0-spa-js.production.js"></script>
    <style>
      :root {
        --font-ui: Inter, system-ui, -apple-system, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        --font-display: Sora, Inter, system-ui, sans-serif;
        --color-bg: #0a0a0a;
        --color-surface: #1f2426;
        --color-surface-alt: #2f3437;
        --color-heading: #fbe7b5;
        --color-text: #e8d3a3;
        --color-text-muted: #cccccc;
        --color-border: #3a4246;
        --color-accent: #2dd4bf;
        --color-accent-strong: #2dd4bf;
        --color-accent-contrast: #0a0a0a;
        --shadow-soft: 0 6px 24px rgba(0, 0, 0, 0.35);
        --shadow-strong: 0 18px 40px rgba(0, 0, 0, 0.55);
        --radius-lg: 20px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(
            circle at top left,
            rgba(45, 212, 191, 0.24),
            transparent 55%
          ),
          radial-gradient(
            circle at bottom right,
            rgba(245, 158, 11, 0.12),
            transparent 55%
          ),
          var(--color-bg);
        color: var(--color-text);
        font-family: var(--font-ui);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .auth-card {
        width: min(520px, 100%);
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        padding: 32px;
        box-shadow: var(--shadow-strong);
      }

      .auth-card__title {
        font-family: var(--font-display);
        font-size: 2rem;
        margin: 0 0 8px;
        color: var(--color-heading);
      }

      .auth-card__subtitle {
        margin: 0 0 20px;
        color: var(--color-text-muted);
        line-height: 1.6;
      }

      .auth-card__status {
        margin-top: 16px;
        font-size: 0.9rem;
        color: var(--color-text-muted);
      }

      .auth-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 20px;
        border-radius: 999px;
        border: 1px solid transparent;
        background: linear-gradient(
          135deg,
          var(--color-accent-strong),
          var(--color-accent)
        );
        color: var(--color-accent-contrast);
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        box-shadow: var(--shadow-soft);
      }

      .auth-button:focus-visible {
        outline: 2px solid var(--color-accent);
        outline-offset: 3px;
      }

      .auth-link {
        color: var(--color-heading);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main id="auth0-root" class="auth-card">
      <h1 class="auth-card__title">Acceso CMS</h1>
      <p class="auth-card__subtitle">
        Inicia sesión con Auth0 para abrir el panel de administración de
        adrianmariscal.es.
      </p>
      <button id="auth0-login" class="auth-button">Iniciar sesión</button>
      <p class="auth-card__status">
        ¿Problemas para entrar? Revisa la configuración en
        <a class="auth-link" href="/admin/auth0-config.js">auth0-config.js</a>.
      </p>
    </main>
    <script src="/admin/auth0-login.js"></script>
  </body>
</html>
