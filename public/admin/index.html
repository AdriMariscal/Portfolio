<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CMS · Portfolio</title>
    <script src="/admin/auth0-config.js"></script>
    <script src="https://cdn.auth0.com/js/auth0-spa-js/2.1/auth0-spa-js.production.js"></script>
  </head>
  <body>
    <main id="auth0-root" style="font-family: system-ui, sans-serif; padding: 24px;">
      <h1 style="margin: 0 0 12px;">Acceso CMS</h1>
      <p style="margin: 0 0 16px;">
        Inicia sesión con Auth0 para abrir el panel de administración.
      </p>
      <button id="auth0-login" style="padding: 8px 16px; font-size: 16px;">
        Iniciar sesión
      </button>
    </main>
    <script>
      const { AUTH0_DOMAIN, AUTH0_CLIENT_ID, AUTH0_AUDIENCE } =
        window.AUTH0_CONFIG || {};

      if (!AUTH0_DOMAIN || !AUTH0_CLIENT_ID) {
        const root = document.getElementById("auth0-root");
        root.innerHTML =
          "<p>Faltan las variables de Auth0. Revisa <code>public/admin/auth0-config.js</code>.</p>";
      } else {
        const loginButton = document.getElementById("auth0-login");
        let auth0Client;

        const initAuth0 = async () => {
          auth0Client = await createAuth0Client({
            domain: AUTH0_DOMAIN,
            clientId: AUTH0_CLIENT_ID,
            authorizationParams: {
              redirect_uri: window.location.origin + "/admin/",
              audience: AUTH0_AUDIENCE || undefined,
            },
          });

          if (window.location.search.includes("code=")) {
            await auth0Client.handleRedirectCallback();
            window.history.replaceState({}, document.title, "/admin/");
          }

          const isAuthenticated = await auth0Client.isAuthenticated();
          if (!isAuthenticated) {
            loginButton.addEventListener("click", () =>
              auth0Client.loginWithRedirect(),
            );
            return;
          }

          const token = await auth0Client.getTokenSilently();
          window.CMS_AUTH_TOKEN = token;
          const cmsScript = document.createElement("script");
          cmsScript.src =
            "https://cdn.jsdelivr.net/npm/decap-cms@3/dist/decap-cms.js";
          document.body.appendChild(cmsScript);
          document.getElementById("auth0-root").remove();
        };

        initAuth0();
      }
    </script>
  </body>
</html>
